name: Release Hygiene

on:
  push:
    branches: [main, develop]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage-and-unreleased:
    if: github.ref_type == 'branch' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: pytest tests/ --cov=sendsprint --cov-report=xml:coverage.xml

      - name: Refresh coverage badge
        run: python scripts/generate_coverage_badge.py --coverage coverage.xml --output docs/assets/coverage-badge.svg

      - name: Refresh CHANGELOG [Unreleased]
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            python scripts/build_changelog.py --since "$LAST_TAG" --write-unreleased
          else
            echo "No git tag found; keeping the current [Unreleased] section."
          fi

      - name: Commit generated release hygiene files
        run: |
          if git diff --quiet -- docs/assets/coverage-badge.svg CHANGELOG.md; then
            echo "No generated file changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/coverage-badge.svg CHANGELOG.md
          git commit -m "ci(release): refresh coverage badge and changelog"
          git push origin HEAD:${GITHUB_REF_NAME}

  promote-tagged-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Promote CHANGELOG release entry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "$DEFAULT_BRANCH"
          git pull --ff-only origin "$DEFAULT_BRANCH"
          python scripts/build_changelog.py --promote "$VERSION"
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG already promoted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): promote $VERSION"
          git push origin HEAD:"$DEFAULT_BRANCH"
