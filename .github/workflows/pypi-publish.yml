name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI with trusted publishing
        id: trusted-publish
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI with token fallback
        if: steps.trusted-publish.outcome == 'failure' && env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}

      - name: Fail when PyPI authentication is unavailable
        if: steps.trusted-publish.outcome == 'failure' && env.PYPI_API_TOKEN == ''
        run: |
          echo "PyPI trusted publishing failed and PYPI_API_TOKEN is not configured."
          exit 1
